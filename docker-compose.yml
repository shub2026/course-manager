version: '3.8'

# KEC 课程管理平台 Docker Compose 配置
# 适用于 1Panel 容器化部署

services:
  # 后端服务 - Node.js + SQLite
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-kec}-server
    restart: always
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/kec.db
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      # 数据持久化 - 适配 1Panel 卷挂载
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - kec-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # 前端服务 - Nginx 静态文件服务器
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-kec}-client
    restart: always
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - kec-network
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# 网络配置
networks:
  kec-network:
    driver: bridge
    name: ${NETWORK_NAME:-kec-network}
